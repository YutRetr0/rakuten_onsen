<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <title>Rakuten Onsen Search</title>
  <style>
    body{font-family:system-ui,sans-serif;max-width:1100px;margin:2em auto;padding:0 1em;background:#fafafa}
    h1{color:#b1430a}
    form{background:#fff;padding:1em;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;gap:.6em;flex-wrap:wrap;align-items:end}
    label{font-size:13px;display:flex;flex-direction:column}
    input,select,button{padding:6px 8px;font-size:14px}
    button{background:#b1430a;color:#fff;border:0;border-radius:4px;cursor:pointer}
    .hotel{display:flex;gap:1em;background:#fff;border-radius:8px;padding:1em;margin:1em 0;box-shadow:0 1px 3px rgba(0,0,0,.08)}
    .hotel img{width:180px;height:130px;object-fit:cover;border-radius:6px}
    .badge{display:inline-block;background:#fef3c7;color:#92400e;padding:2px 8px;border-radius:10px;margin:2px;font-size:12px}
    .rating{color:#d97706;font-weight:bold}
    table{width:100%;border-collapse:collapse;margin-top:.5em;font-size:13px}
    th,td{border:1px solid #eee;padding:5px 8px;text-align:left}
    th{background:#fafafa}
    .price{color:#b91c1c;font-weight:bold}
    .scores{font-size:12px;color:#555}
  </style>
</head>
<body>
  <h1>Rakuten Travel Onsen Search</h1>
  <form id="f">
    <label>Region
      <select name="region">
        {% for r in regions %}<option value="{{r}}" {% if r=="oita" %}selected{% endif %}>{{r}}</option>{% endfor %}
      </select>
    </label>
    <label>Check-in<input type="date" name="checkin" required></label>
    <label>Check-out<input type="date" name="checkout" required></label>
    <label>Adults<input type="number" name="adults" value="2" min="1" max="10"></label>
    <label>Rooms<input type="number" name="rooms"  value="1" min="1" max="5"></label>
    <label>Max JPY/person<input type="number" name="max_charge" placeholder="any"></label>
    <label>Pages<input type="number" name="pages" value="2" min="1" max="5"></label>
    <button>Search</button>
  </form>
  <p id="meta" style="margin-top:1em"></p>
  <div id="list"></div>
<script>
document.getElementById("f").addEventListener("submit", async (e)=>{
  e.preventDefault();
  const fd = new FormData(e.target);
  for (const [k,v] of [...fd]) if(!v) fd.delete(k);
  const qs = new URLSearchParams(fd).toString();
  document.getElementById("meta").innerText = "Loading...";
  const r = await fetch("/api/search?"+qs);
  const data = await r.json();
  if(data.error){ document.getElementById("meta").innerText = "Error: "+data.error; return; }
  document.getElementById("meta").innerText =
    \
`\${data.count} onsen hotels - \${data.checkin} to \${data.checkout} - \${data.adults} adults / \${data.rooms} room(s) - cache \${data.cache_ttl_seconds}s`;
  document.getElementById("list").innerHTML = data.hotels.map(h => `
    <div class="hotel">
      ${h.image ? `<img src="${h.image}" alt="">` : ""}
      <div style="flex:1">
        <h3 style="margin:0">
          <a href="${h.url}" target="_blank">${h.name}</a>
          ${h.review_avg ? `<span class="rating">★ ${h.review_avg} (${h.review_count||0})</span>` : ""}
        </h3>
        <div style="color:#666;font-size:13px">${h.address||""} · ${h.access||""}</div>
        <div class="scores">
          ${h.bath_score ? `Bath ${h.bath_score} ` : ""}
          ${h.room_score ? `Room ${h.room_score} ` : ""}
          ${h.meal_score ? `Meal ${h.meal_score} ` : ""}
          ${h.service_score ? `Service ${h.service_score} ` : ""}
          ${h.location_score ? `Location ${h.location_score}` : ""}
        </div>
        <div>${(h.onsen_types||[]).map(t=>`<span class="badge">${t}</span>`).join("")}</div>
        ${h.rooms.length ? `
          <table>
            <tr><th>Room / Plan</th><th>Cap</th><th class="price">Price (JPY)</th><th>Available</th></tr>
            ${h.rooms.map(r => `<tr>
              <td><div><strong>${r.room_name||"-"}</strong></div><div style="color:#888;font-size:12px">${r.plan_name||""}</div></td>
              <td>${r.max_occupancy ?? "-"}</td>
              <td class="price">${r.price ? r.price.toLocaleString() : "-"}</td>
              <td>${r.available ?? "-"}</td>
            </tr>`).join("")}
          </table>
          <div style="margin-top:4px;font-size:12px;color:#666">Total bookable rooms in this query: <strong>${h.total_rooms}</strong></div>
        ` : `<div style="color:#888">No available plans</div>`}
      </div>
    </div>
  `).join("") || "<p>No results</p>";
});
</script>
</body>
</html>
